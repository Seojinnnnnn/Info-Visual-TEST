  #header {

  .ctrl-btn {

    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: #111; color: #f5f4ef; border-color: #111; }
  .ctrl-btn.active { background: #111; color: #f5f4ef; border-color: #111; }

  #canvas-wrap {
    width: 100vw; height: 100vh;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }
  #canvas-wrap:active { cursor: grabbing; }

  svg#lines {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s ease;
    display: flex; align-items: center; justify-content: center;

  .node:hover { transform: translate(-50%, -50%) scale(1.3); z-index: 50 !important; }

  .node-label {
    position: absolute;

    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 8px;
    font-family: 'IBM Plex Mono', monospace;
    color: #555;
    pointer-events: none;
    letter-spacing: 0.02em;
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
  }

  #tooltip {
    position: fixed;
    background: #fff;
    border: 1px solid #111;
    padding: 0;
    z-index: 200;
    pointer-events: none;
    display: none;
    max-width: 220px;
    box-shadow: 3px 3px 0 #111;
  }
  #tooltip img {
    width: 220px; height: 160px;

    display: block;
  }
  #tooltip .tt-body {

  #tooltip .tt-name {

    color: #111;

  }

  #sort-label {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(60px, 12vw, 140px);
    font-weight: 700;
    text-transform: uppercase;
    color: rgba(0,0,0,0.04);
    letter-spacing: -0.04em;
    pointer-events: none;
    z-index: 0;
    white-space: nowrap;
    transition: opacity 0.4s;

// 날짜 고유값 목록
const dates = [...new Set(files.map(f => f.date).filter(Boolean))].sort();
const dateIndex = {};
dates.forEach((d,i) => dateIndex[d] = i);

function getNodeColor(f) {
  if (f.photoroom_edited) return '#f97316';
  if (f.source === 'HuggingFace') return '#3b82f6';
  return '#22c55e';
}

function getNodeSize(f) {
  // id 기반 크기 (1~151), 8~26px
  const min = 8, max = 26;
  return min + ((max - min) * (1 - (f.id - 1) / 150));
}

// 랜덤 시드 기반 위치 (재현 가능)
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

function computePositions(sortMode) {
  const pos = {};
  const margin = 120;

  if (sortMode === 'date') {
    // X = 날짜 (왼→오), Y = 시간 + jitter
    const datesWithNull = [...dates, 'unknown'];
    const xStep = (W - margin*2) / Math.max(datesWithNull.length - 1, 1);
    files.forEach(f => {
      const rng = seededRandom(f.id * 137);
      const dIdx = f.date ? dateIndex[f.date] : datesWithNull.length - 1;
      const x = margin + dIdx * xStep + (rng() - 0.5) * 60;
      let y;
      if (f.time) {
        const parts = f.time.split(':');
        const secs = parseInt(parts[0])*3600 + parseInt(parts[1])*60 + parseInt(parts[2]);
        y = margin + (secs / 86400) * (H - margin*2) + (rng() - 0.5) * 40;
      } else {
        y = margin + rng() * (H - margin*2);
      }
      pos[f.id] = { x, y };
    });

  } else if (sortMode === 'source') {
    const sources = ['HuggingFace', 'Gemini'];
    const xStep = (W - margin*2) / (sources.length - 1);
    files.forEach(f => {
      const rng = seededRandom(f.id * 113);
      const sIdx = sources.indexOf(f.source);
      const x = margin + sIdx * xStep + (rng() - 0.5) * 200;
      const y = margin + rng() * (H - margin*2);
      pos[f.id] = { x, y };
    });

  } else if (sortMode === 'ext') {
    const exts = [...new Set(files.map(f => f.ext))].sort();
    const xStep = (W - margin*2) / Math.max(exts.length - 1, 1);
    files.forEach(f => {
      const rng = seededRandom(f.id * 97);
      const eIdx = exts.indexOf(f.ext);
      const x = margin + eIdx * xStep + (rng() - 0.5) * 120;
      const y = margin + rng() * (H - margin*2);
      pos[f.id] = { x, y };
    });

  } else if (sortMode === 'photoroom') {
    files.forEach(f => {
      const rng = seededRandom(f.id * 79);
      const x = f.photoroom_edited
        ? margin + rng() * (W/2 - margin*2)
        : W/2 + rng() * (W/2 - margin*2);
      const y = margin + rng() * (H - margin*2);
      pos[f.id] = { x, y };
    });
  }
  return pos;
}

function buildEdges(files) {
  const edges = [];
  // 같은 날짜 연결 (date lines - blue)
  const byDate = {};
  files.forEach(f => {
    if (!f.date) return;
    if (!byDate[f.date]) byDate[f.date] = [];
    byDate[f.date].push(f.id);
  });
  Object.values(byDate).forEach(ids => {
    for (let i = 0; i < ids.length - 1; i++) {
      edges.push({a: ids[i], b: ids[i+1], color: '#3b82f6', opacity: 0.25, width: 1});
    }
  });

  // 같은 UUID 앞 8자 (red) - Photoroom pair
  const uuidMap = {};
  files.forEach(f => {
    const parts = f.filename.split('_');
    const uuid = parts.find(p => p.includes('-'));
    if (!uuid) return;
    const key = uuid.split('-')[0];
    if (!uuidMap[key]) uuidMap[key] = [];
    uuidMap[key].push(f.id);
  });
  Object.values(uuidMap).forEach(ids => {
    if (ids.length < 2) return;
    for (let i = 0; i < ids.length - 1; i++) {
      edges.push({a: ids[i], b: ids[i+1], color: '#ef4444', opacity: 0.5, width: 1.5});
    }
  });

  // 같은 확장자 중 일부 (purple) - 너무 많으면 스킵, 30개만
  const byExt = {};
  files.forEach(f => {
    if (!byExt[f.ext]) byExt[f.ext] = [];
    byExt[f.ext].push(f.id);
  });
  let extEdgeCount = 0;
  Object.values(byExt).forEach(ids => {
    if (ids.length < 2 || extEdgeCount > 30) return;
    for (let i = 0; i < Math.min(ids.length - 1, 5); i++) {
      edges.push({a: ids[i], b: ids[i+4] || ids[ids.length-1], color: '#a855f7', opacity: 0.15, width: 1});
      extEdgeCount++;
    }
  });

  return edges;
}

function renderLines(edges, pos) {
  const svg = document.getElementById('lines');
  const wrap = document.getElementById('canvas-wrap');
  svg.setAttribute('viewBox', `0 0 ${wrap.offsetWidth} ${wrap.offsetHeight}`);
  svg.innerHTML = edges.map(e => {
    const a = pos[e.a], b = pos[e.b];
    if (!a || !b) return '';
    const ax = a.x + pan.x, ay = a.y + pan.y;
    const bx = b.x + pan.x, by = b.y + pan.y;
    return `<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="${e.color}" stroke-opacity="${e.opacity}" stroke-width="${e.width}"/>`;
  }).join('');
}

function renderNodes(pos) {
  const container = document.getElementById('nodes');
  container.innerHTML = '';
  files.forEach(f => {
    const p = pos[f.id];
    if (!p) return;
    const size = getNodeSize(f);
    const color = getNodeColor(f);
    const div = document.createElement('div');
    div.className = 'node';
    div.style.width = size + 'px';
    div.style.height = size + 'px';
    div.style.background = color;
    div.style.left = (p.x + pan.x) + 'px';
    div.style.top = (p.y + pan.y) + 'px';
    div.style.zIndex = Math.round(size);
    div.dataset.id = f.id;

    const label = document.createElement('div');
    label.className = 'node-label';
    const short = f.filename.replace('hf_','').replace('Gemini_Generated_Image_','G_').substring(0,12);
    label.textContent = short;
    div.appendChild(label);

    div.addEventListener('mouseenter', (e) => showTooltip(e, f));
    div.addEventListener('mousemove', (e) => moveTooltip(e));
    div.addEventListener('mouseleave', hideTooltip);

    container.appendChild(div);
  });
}

function showTooltip(e, f) {
  const tt = document.getElementById('tooltip');
  const imgWrap = document.getElementById('tt-img-wrap');
  const isImg = f.ext !== 'mp4';
  if (isImg) {
    imgWrap.innerHTML = `<img src="file://${f.path}" onerror="this.outerHTML='<div class=\\'tt-err\\'>🎨</div>'">`;
  } else {
    imgWrap.innerHTML = `<div class="tt-err">🎬</div>`;
  }
  document.getElementById('tt-name').textContent = f.filename;
  document.getElementById('tt-info').innerHTML =
    `source: ${f.source}<br>` +
    (f.date ? `date: ${f.date} ${f.time || ''}<br>` : '') +
    `ext: ${f.ext}<br>` +
    (f.photoroom_edited ? `✂ photoroom edited` : '');
  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  let x = e.clientX + 16, y = e.clientY - 10;
  if (x + 240 > window.innerWidth) x = e.clientX - 240;
  if (y + 260 > window.innerHeight) y = e.clientY - 260;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function setSort(mode) {
  currentSort = mode;
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('sort-label').textContent = mode.toUpperCase();
  positions = computePositions(mode);
  const edges = buildEdges(files);
  renderLines(edges, positions);
  renderNodes(positions);
}

function resetView() {
  pan = {x: 0, y: 0};
  positions = computePositions(currentSort);
  const edges = buildEdges(files);
  renderLines(edges, positions);
  renderNodes(positions);
}

// 팬 드래그
const wrap = document.getElementById('canvas-wrap');
wrap.addEventListener('mousedown', e => {
  isDragging = true;
  dragStart = {x: e.clientX, y: e.clientY};
  panStart = {...pan};
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  pan.x = panStart.x + (e.clientX - dragStart.x);
  pan.y = panStart.y + (e.clientY - dragStart.y);
  const edges = buildEdges(files);
  renderLines(edges, positions);
  document.querySelectorAll('.node').forEach(n => {
    const f = files.find(f => f.id == n.dataset.id);
    const p = positions[f.id];
    n.style.left = (p.x + pan.x) + 'px';
    n.style.top = (p.y + pan.y) + 'px';
  });
});
window.addEventListener('mouseup', () => isDragging = false);

// 초기 렌더
document.getElementById('count-label').textContent = `${files.length} files · HF ${DB.metadata.hf_count} · Gemini ${DB.metadata.gemini_count}`;
positions = computePositions('date');
const edges = buildEdges(files);
renderLines(edges, positions);
renderNodes(positions);
</script>
</body>
</html>
