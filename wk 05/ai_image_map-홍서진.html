      margin: 0;
      padding: 0;

    :root {

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text);

    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 18px 28px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      z-index: 100;
      pointer-events: none;

      font-size: clamp(28px, 5vw, 64px);
      font-weight: 700;
      line-height: 0.92;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    #header .sub {
      font-size: 10px;
      font-weight: 400;
      color: #666;
      margin-top: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #legend {
      position: fixed;
      bottom: 20px;
      left: 28px;
      font-size: 10px;
      z-index: 100;
      pointer-events: none;
      line-height: 2;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-line {
      width: 24px;
      height: 2px;
      flex-shrink: 0;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      right: 28px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .ctrl-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      padding: 6px 12px;
      border: 1px solid #999;
      background: rgba(245, 244, 239, 0.85);
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.15s;
    }

    .ctrl-btn:hover {
      background: #111;
      color: #f5f4ef;
      border-color: #111;
    }

    .ctrl-btn.active {
      background: #111;
      color: #f5f4ef;
      border-color: #111;
    }

    #canvas-wrap {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    svg#lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .node {
      position: absolute;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .node:hover {
      z-index: 50 !important;
    }



    #tooltip {
      position: fixed;
      background: #fff;
      border: 1px solid #111;
      padding: 0;
      z-index: 200;
      pointer-events: none;
      display: none;
      max-width: 220px;
      box-shadow: 3px 3px 0 #111;
    }

    #tooltip img {
      width: 220px;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    #tooltip .tt-body {
      padding: 8px 10px;
      font-size: 9px;
      line-height: 1.6;
      color: #333;
    }

    #tooltip .tt-name {
      font-weight: 600;
      font-size: 9px;
      color: #111;
      word-break: break-all;
      margin-bottom: 4px;
    }

    #tooltip .tt-err {
      width: 220px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-size: 20px;
    }

    #sort-label {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(60px, 12vw, 140px);
      font-weight: 700;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.04);
      letter-spacing: -0.04em;
      pointer-events: none;
      z-index: 0;
      white-space: nowrap;
      transition: opacity 0.4s;
    }

e_tx1ds0tx1ds0tx1d.png", "size": 0 }] };

    const files = DB.files;
    let W = window.innerWidth, H = window.innerHeight;
    let positions = {};
    let currentSort = 'date';

    // 날짜 고유값 목록
    const dates = [...new Set(files.map(f => f.date).filter(Boolean))].sort();
    const dateIndex = {};
    dates.forEach((d, i) => dateIndex[d] = i);

    function getNodeColor(f) {
      if (!f.date) return '#ccc';
      const dt = new Date(f.date);
      if (isNaN(dt.getTime())) return '#ccc';
      const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#6366f1', '#a855f7'];
      return colors[dt.getDay()];
    }

    function getNodeSize(f) {
      const min = 8, max = 200;
      const maxSize = Math.max(...DB.files.map(x => x.size || 0), 1);
      const size = f.size || 0;
      // Create a slight curve so small files are still visible
      return min + ((max - min) * Math.sqrt(size / maxSize));
    }

    // 랜덤 시드 기반 위치 (재현 가능)
    function seededRandom(seed) {
      let s = seed;
      return function () {
        s = (s * 9301 + 49297) % 233280;
        return s / 233280;
      };
    }

    function computePositions(sortMode) {
      const pos = {};
      const margin = 100;
      const colCount = 7;
      const colWidth = (W - margin * 2) / colCount;
      const startX = margin + colWidth / 2;

      // 요일별로 그룹 (0: 일, 1: 월, ..., 6: 토)
      const columns = [[], [], [], [], [], [], []];

      files.forEach(f => {
        if (f.date) {
          const dt = new Date(f.date);
          if (!isNaN(dt.getTime())) {
            columns[dt.getDay()].push(f);
          }
        }
      });

      columns.forEach((col, c) => {
        col.sort((a, b) => {
          const dtA = (a.date || '9999-99-99') + '_' + (a.time || '');
          const dtB = (b.date || '9999-99-99') + '_' + (b.time || '');
          return dtA.localeCompare(dtB) || a.filename.localeCompare(b.filename);
        });

        const startY = 160;
        const rowStep = (H - startY - margin) / Math.max(col.length - 1, 1);

        col.forEach((f, r) => {
          const rng = seededRandom(f.id * 137);
          const x = startX + c * colWidth + (rng() - 0.5) * (colWidth * 0.5);
          const y = startY + r * rowStep + (rng() - 0.5) * 15;
          pos[f.id] = { x, y };
        });
      });

      return pos;
    }

    function buildEdges(files) {
      const edges = [];

      // 요일별 그룹
      const columns = [[], [], [], [], [], [], []];
      files.forEach(f => {
        if (f.date) {
          const dt = new Date(f.date);
          if (!isNaN(dt.getTime())) columns[dt.getDay()].push(f);
        }
      });

      // 각 요일별로 정렬 순서에 맞춰 라인 연결
      columns.forEach(col => {
        col.sort((a, b) => {
          const dtA = (a.date || '9999-99-99') + '_' + (a.time || '');
          const dtB = (b.date || '9999-99-99') + '_' + (b.time || '');
          return dtA.localeCompare(dtB) || a.filename.localeCompare(b.filename);
        });

        for (let i = 0; i < col.length - 1; i++) {
          edges.push({ a: col[i].id, b: col[i + 1].id, color: '#9ca3af', opacity: 0.3, width: 1.5 });
        }
      });

      return edges;
    }

    function renderLines(edges, pos) {
      const svg = document.getElementById('lines');
      const wrap = document.getElementById('canvas-wrap');
      svg.setAttribute('viewBox', `0 0 ${wrap.offsetWidth} ${wrap.offsetHeight}`);
      svg.innerHTML = edges.map(e => {
        const a = pos[e.a], b = pos[e.b];
        if (!a || !b) return '';
        const ax = a.x, ay = a.y;
        const bx = b.x, by = b.y;
        return `<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="${e.color}" stroke-opacity="${e.opacity}" stroke-width="${e.width}"/>`;
      }).join('');
    }

    function renderNodes(pos) {
      const container = document.getElementById('nodes');
      container.innerHTML = '';



      files.forEach(f => {
        const p = pos[f.id];
        if (!p) return;
        const size = getNodeSize(f);
        const color = getNodeColor(f);
        const div = document.createElement('div');
        div.className = 'node';
        div.style.width = size + 'px';
        div.style.height = size + 'px';

        if (f.ext === 'png') {
          div.style.background = color;
          div.style.border = `2px dashed ${color}`;
          div.style.opacity = '0.3';
        } else {
          div.style.background = color;
        }

        div.style.left = p.x + 'px';
        div.style.top = p.y + 'px';
        div.style.zIndex = Math.round(size);
        div.dataset.id = f.id;



        div.addEventListener('mouseenter', (e) => showTooltip(e, f));
        div.addEventListener('mousemove', (e) => moveTooltip(e));
        div.addEventListener('mouseleave', hideTooltip);

        container.appendChild(div);
      });
    }

    function showTooltip(e, f) {
      const tt = document.getElementById('tooltip');
      const imgWrap = document.getElementById('tt-img-wrap');
      imgWrap.style.display = 'none';
      document.getElementById('tt-name').textContent = f.filename;
      document.getElementById('tt-info').innerHTML =
        `source: ${f.source}<br>` +
        (f.date ? `date: ${f.date} ${f.time || ''}<br>` : '') +
        `ext: ${f.ext}<br>` +
        (f.size ? `size: ${(f.size / 1024).toFixed(0)} KB<br>` : '') +
        (f.photoroom_edited ? `✂ photoroom edited` : '');
      tt.style.display = 'block';
      moveTooltip(e);
    }

    function moveTooltip(e) {
      const tt = document.getElementById('tooltip');
      let x = e.clientX + 16, y = e.clientY - 10;
      if (x + 240 > window.innerWidth) x = e.clientX - 240;
      if (y + 260 > window.innerHeight) y = e.clientY - 260;
      tt.style.left = x + 'px';
      tt.style.top = y + 'px';
    }

    function hideTooltip() {
      document.getElementById('tooltip').style.display = 'none';
    }

    function setSort(mode) {
      currentSort = mode;
      document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      positions = computePositions(mode);
      const edges = buildEdges(files);
      renderLines(edges, positions);
      renderNodes(positions);
    }

    let engine, runner;
    let nodeBodies = {};
    let activeEdges = [];

    function initPhysics() {
      if (engine) {
        Matter.Engine.clear(engine);
        if (runner) Matter.Runner.stop(runner);
      }

      const { Engine, World, Bodies, Body, Runner, Events } = Matter;
      engine = Engine.create();
      const world = engine.world;

      // 시작 시에는 무중력
      world.gravity.y = 0;
      world.gravity.x = 0;

      // 바닥과 양옆 벽 생성
      const wallOpts = { isStatic: true, render: { visible: false }, friction: 0.1, restitution: 0.5 };
      const thickness = 100;
      World.add(world, [
        Bodies.rectangle(W / 2, H + thickness / 2, W * 4, thickness, wallOpts), // Bottom
        Bodies.rectangle(-thickness / 2, H / 2, thickness, H * 4, wallOpts), // Left
        Bodies.rectangle(W + thickness / 2, H / 2, thickness, H * 4, wallOpts) // Right
      ]);

      files.forEach(f => {
        const p = positions[f.id];
        if (!p) return;
        const r = getNodeSize(f) / 2;
        // 반발력 0.9로 튕김성 극대화, 마찰력 제거
        const body = Bodies.circle(p.x, p.y, r, {
          restitution: 0.9,
          frictionAir: 0.05,
          friction: 0.005,
          density: 0.01
        });
        // 약간의 초기 속도로 자기들끼리 밀어내기 시작
        Body.setVelocity(body, { x: (Math.random() - 0.5) * 4, y: (Math.random() - 0.5) * 4 });

        const dom = document.querySelector(`[data-id="${f.id}"]`);
        // 드래그 인터랙션 추가
        dom.addEventListener('mousedown', e => {
          e.preventDefault();
          draggedBody = body;
        });

        nodeBodies[f.id] = { dom, body, orig: { x: p.x, y: p.y } };
        World.add(world, body);
      });

      runner = Runner.create();
      Runner.run(runner, engine);

      Events.on(engine, 'afterUpdate', function () {
        let updateEdges = false;
        files.forEach(f => {
          const nb = nodeBodies[f.id];
          if (!nb || !nb.dom) return;
          const pos = nb.body.position;

          if (world.gravity.y === 0) {
            // 원래 자리 주변에서 맴돌도록 아주 약한 스프링 장력 + 랜덤 무작위성 (부딪힘 유도)
            const forceX = (nb.orig.x - pos.x) * 0.000015 + (Math.random() - 0.5) * 0.0002;
            const forceY = (nb.orig.y - pos.y) * 0.000015 + (Math.random() - 0.5) * 0.0002;
            Body.applyForce(nb.body, pos, { x: forceX, y: forceY });
          }

          nb.dom.style.left = pos.x + 'px';
          nb.dom.style.top = pos.y + 'px';

          if (Math.abs(positions[f.id].x - pos.x) > 0.5 || Math.abs(positions[f.id].y - pos.y) > 0.5) {
            positions[f.id].x = pos.x;
            positions[f.id].y = pos.y;
            updateEdges = true;
          }
        });

        if (updateEdges) {
          renderLines(activeEdges, positions);
        }
      });

      // 15초 후에 중력 발생 및 와르르 쏟아짐
      setTimeout(() => {
        world.gravity.y = 1.2;
        Object.values(nodeBodies).forEach(nb => {
          // 쏟아지고 바닥에 닿은 후 계속 부딪치며 움직이지 않도록 탄성 감소
          nb.body.restitution = 0.1;
          nb.body.friction = 0.8;
          Body.setVelocity(nb.body, { x: (Math.random() - 0.5) * 15, y: -Math.random() * 15 });
        });
      }, 15000);
    }

    let draggedBody = null;

    // 전역 마우스 드래그 이벤트 (원을 잡고 옮기기)
    document.addEventListener('mousemove', e => {
      if (draggedBody) {
        Matter.Body.setPosition(draggedBody, { x: e.clientX, y: e.clientY });
        Matter.Body.setVelocity(draggedBody, { x: 0, y: 0 }); // 드래그 중 제멋대로 움직임 방지
      }
    });
    document.addEventListener('mouseup', () => { draggedBody = null; });

    // 초기 렌더
    document.getElementById('count-label').textContent = `${files.length} files · HF ${DB.metadata.hf_count} · Gemini ${DB.metadata.gemini_count}`;
    positions = computePositions('date');
    activeEdges = buildEdges(files);
    renderLines(activeEdges, positions);
    renderNodes(positions);

    initPhysics();
  </script>
</body>

</html>
